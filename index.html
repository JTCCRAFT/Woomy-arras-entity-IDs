<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woomy Arras Entity ID Browser</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        h1 { color: #50af50; }
        #search { 
            width: 100%; padding: 12px; margin-bottom: 20px; 
            background: #333; border: 1px solid #555; color: white; border-radius: 4px;
        }
        #stats { margin-bottom: 10px; font-size: 0.9em; color: #888; }
        #list-container { 
            background: #222; border: 1px solid #444; height: 500px; 
            overflow-y: auto; padding: 10px; border-radius: 4px;
        }
        .id-item { 
            padding: 5px; border-bottom: 1px solid #333; 
            font-family: monospace; cursor: pointer;
        }
        .id-item:hover { background: #333; color: #50af50; }
    </style>
</head>
<body>

<div class="container">
    <h1>Entity ID Browser</h1>
    <p>Loading <b>entityIDs.txt</b>...</p>
    
    <input type="text" id="search" placeholder="Search 9,646 entries... (e.g. 'boss' or 'tank')">
    <div id="stats">Entries found: <span id="count">0</span></div>
    
    <div id="list-container">
        <div id="output">Initializing...</div>
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const searchInput = document.getElementById('search');
    const countDisplay = document.getElementById('count');
    let allIDs = [];

    // 1. Fetch the .txt file
    fetch('entityIDs.txt')
        .then(response => {
            if (!response.ok) throw new Error("Could not find entityIDs.txt");
            return response.text();
        })
        .then(data => {
            // 2. Split by new lines and clean up empty spaces
            allIDs = data.split('\n').map(id => id.trim()).filter(id => id.length > 0);
            renderList(allIDs);
        })
        .catch(err => {
            output.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
        });

    // 3. Function to display the list
    function renderList(list) {
        countDisplay.innerText = list.length;
        if (list.length === 0) {
            output.innerHTML = "No matches found.";
            return;
        }
        // Use a DocumentFragment for better performance with large lists
        output.innerHTML = '';
        const fragment = document.createDocumentFragment();
        
        // Note: For 9k+ entries, we only show the first 500 for performance, 
        // unless searching, to keep the browser snappy.
        const limit = list.length > 1000 ? 1000 : list.length;
        
        for (let i = 0; i < limit; i++) {
            const div = document.createElement('div');
            div.className = 'id-item';
            div.textContent = list[i];
            div.onclick = () => {
                navigator.clipboard.writeText(list[i]);
                alert("Copied: " + list[i]);
            };
            fragment.appendChild(div);
        }
        output.appendChild(fragment);
        
        if (list.length > 1000) {
            const more = document.createElement('div');
            more.style.padding = "10px";
            more.style.color = "#888";
            more.innerText = `... and ${list.length - 1000} more. Use Search to narrow it down.`;
            output.appendChild(more);
        }
    }

    // 4. Search logic
    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allIDs.filter(id => id.toLowerCase().includes(term));
        renderList(filtered);
    });
</script>

</body>
</html>
