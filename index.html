<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woomy Arras Entity ID Browser</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; line-height: 1.5; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #30363d; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { color: #58a6ff; font-size: 1.5rem; margin: 0; }
        .repo-link { color: #8b949e; text-decoration: none; font-size: 0.9rem; }
        .repo-link:hover { text-decoration: underline; }
        
        #search { 
            width: 100%; padding: 10px 15px; margin-bottom: 10px; 
            background: #161b22; border: 1px solid #30363d; color: white; border-radius: 6px;
            box-sizing: border-box; font-size: 1rem;
        }
        #search:focus { border-color: #58a6ff; outline: none; box-shadow: 0 0 0 3px rgba(88,166,255,0.3); }
        
        #stats { margin-bottom: 15px; font-size: 0.85rem; color: #8b949e; }
        
        #list-container { 
            background: #161b22; border: 1px solid #30363d; height: 65vh; 
            overflow-y: auto; border-radius: 6px; position: relative;
        }
        .id-item { 
            padding: 10px 15px; border-bottom: 1px solid #21262d; 
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: background 0.1s;
        }
        .id-item:hover { background: #1f242c; }
        .id-item:active { background: #23863622; }
        .id-item span { color: #79c0ff; }
        .id-item::after { content: 'COPY'; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: #21262d; color: #8b949e; opacity: 0; }
        .id-item:hover::after { opacity: 1; }

        .loading-spinner { padding: 40px; text-align: center; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Woomy Entity ID Browser</h1>
        <a href="https://github.com/JTCCRAFT/Woomy-arras-entity-IDs" target="_blank" class="repo-link">View Repository</a>
    </div>

    <input type="text" id="search" placeholder="Search 9,646 entities (e.g. 'fallen', 'pentagon', 'tank')...">
    <div id="stats">Total: <span id="count">0</span> | <small>Click an entry to copy its ID</small></div>
    
    <div id="list-container">
        <div id="output" class="loading-spinner">Connecting to GitHub...</div>
    </div>
</div>

<script>
    // Direct link to your raw file
    const fileUrl = 'https://raw.githubusercontent.com/JTCCRAFT/Woomy-arras-entity-IDs/main/entityIDs.txt';

    const output = document.getElementById('output');
    const searchInput = document.getElementById('search');
    const countDisplay = document.getElementById('count');
    let allIDs = [];

    async function loadData() {
        try {
            const response = await fetch(fileUrl);
            if (!response.ok) throw new Error("Could not fetch data. Check repo visibility.");
            const data = await response.text();
            
            // Cleanup: filter out empty lines or weird spaces
            allIDs = data.split(/\r?\n/).map(id => id.trim()).filter(id => id.length > 0);
            
            renderList(allIDs);
        } catch (err) {
            output.innerHTML = `<div style="color:#f85149; padding:20px;">Error: ${err.message}</div>`;
        }
    }

    function renderList(list) {
        countDisplay.innerText = list.length.toLocaleString();
        output.innerHTML = '';
        
        if (list.length === 0) {
            output.innerHTML = '<div class="loading-spinner">No matching entities found.</div>';
            return;
        }

        const fragment = document.createDocumentFragment();
        // Display limit of 1000 for smooth scrolling; search narrows it down
        const displayLimit = Math.min(list.length, 1000);
        
        for (let i = 0; i < displayLimit; i++) {
            const div = document.createElement('div');
            div.className = 'id-item';
            div.innerHTML = `<span>${list[i]}</span>`;
            
            div.onclick = () => {
                navigator.clipboard.writeText(list[i]);
                const span = div.querySelector('span');
                const originalColor = span.style.color;
                span.style.color = "#3fb950";
                span.textContent = "✓ COPIED";
                setTimeout(() => {
                    span.style.color = originalColor;
                    span.textContent = list[i];
                }, 800);
            };
            fragment.appendChild(div);
        }
        output.appendChild(fragment);
    }

    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allIDs.filter(id => id.toLowerCase().includes(term));
        renderList(filtered);
    });

    loadData();
</script>

</body>
</html>
